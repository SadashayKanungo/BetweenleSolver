<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Betweenle Solver</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; background: #fafafa; }
    .container { width: 320px; background: white; padding: 16px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { margin: 0 0 10px; font-size: 18px; text-align: center; }
    .hidden { display: none; }
    #mode-select { text-align: center; margin: 20px 0; }
    #mode-select button { padding: 10px 16px; margin: 4px; font-size: 14px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; display: block; width: 100%; }
    #mode-select button:hover { background: #eee; }

    .row { display: flex; align-items: center; margin: 6px 0; }
    .row-left { width: 90px; }
    .row-left label { font-size: 11px; color: #666; }
    .row-left input { width: 50px; padding: 3px; margin-left: 4px; }
    .row-center { flex: 1; text-align: center; font-size: 14px; color: #555; text-transform: uppercase; }
    .row-right { width: 50px; text-align: right; }
    .row-right button { width: 40px; height: 40px; font-size: 20px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
    .row-right button:hover { background: #eee; }

    .guess { font-size: 28px; font-weight: bold; color: #2d6b4f; text-align: center; margin: 14px 0; text-transform: uppercase; }
    .info { font-size: 11px; color: #888; text-align: center; margin: 8px 0; }
    #btn-correct { width: 100%; padding: 8px; font-size: 14px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; color: #27ae60; font-weight: bold; }
    #btn-correct:hover { background: #eee; }
    #status { font-size: 12px; color: #333; margin-top: 8px; text-align: center; }
    #reset { margin-top: 8px; font-size: 11px; cursor: pointer; color: #999; text-decoration: underline; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Betweenle Solver</h2>

    <div id="mode-select">
      <button id="mode-interpolation">Use percentages</button>
      <button id="mode-binary">Don't use percentages</button>
    </div>

    <div id="solver" class="hidden">
      <div class="row">
        <div class="row-left" id="pct-top-wrap">
          <label>% top:</label><input type="number" id="pct-top" step="0.01" min="0" max="100" required>
        </div>
        <div class="row-center" id="bound-top"></div>
        <div class="row-right">
          <button id="btn-down" title="Moved to upper limit">&#9650;</button>
        </div>
      </div>

      <div class="guess" id="guess"></div>

      <div class="row">
        <div class="row-left" id="pct-bottom-wrap">
          <label>% bot:</label><input type="number" id="pct-bottom" step="0.01" min="0" max="100" required>
        </div>
        <div class="row-center" id="bound-bottom"></div>
        <div class="row-right">
          <button id="btn-up" title="Moved to lower limit">&#9660;</button>
        </div>
      </div>

      <div class="info" id="words-left"></div>
      <button id="btn-correct">Correct</button>

      <div id="status"></div>
      <div id="reset">Reset</div>
    </div>
  </div>

  <script src="words.js"></script>
  <script src="solver.js"></script>
</body>
</html>
